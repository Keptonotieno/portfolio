<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Intercept and sanitize WebSocket connection issues globally
      try {
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          window.WebSocket = function(url, protocols) {
            try {
              const ws = new OriginalWebSocket(url, protocols);
              // Ensure we attach a silent error listener to prevent unhandled socket events
              ws.addEventListener('error', function(e) {
                console.debug('Silent HMR socket connection error intercepted.');
              });
              return ws;
            } catch (err) {
              console.debug('Failed to initialize socket:', err);
              // Return a mock/dummy websocket to prevent crashes if instantiated
              return {
                addEventListener: () => {},
                removeEventListener: () => {},
                close: () => {},
                send: () => {},
                readyState: 3 // CLOSED
              };
            }
          };
          // Preserve prototype chain
          window.WebSocket.prototype = OriginalWebSocket.prototype;
          Object.assign(window.WebSocket, OriginalWebSocket);
        }
      } catch (e) {
        console.warn('Unable to patch WebSocket:', e);
      }

      // Gracefully handle and suppress benign HMR WebSocket errors/rejections
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (!reason) return;
        
        const isWebsocketError = 
          (reason.message && (reason.message.includes('WebSocket') || reason.message.includes('websocket') || reason.message.includes('WS'))) ||
          (reason.toString && (reason.toString().includes('WebSocket') || reason.toString().includes('websocket') || reason.toString().includes('WS')));
          
        if (isWebsocketError) {
          event.preventDefault(); // Stop from propagating and showing error overlays
          event.stopPropagation();
          console.debug('Suppressed benign HMR websocket unhandled rejection:', reason);
        }
      });

      window.addEventListener('error', function(event) {
        const message = event.message || '';
        if (message.includes('WebSocket') || message.includes('websocket') || message.includes('connection') || message.includes('WS')) {
          event.preventDefault();
          event.stopPropagation();
          console.debug('Suppressed benign HMR websocket error:', message);
        }
      }, true);

      // Prevent the Vite error overlay from popping up for websocket-related connection issues
      const style = document.createElement('style');
      style.innerHTML = `
        vite-error-overlay {
          display: none !important;
          opacity: 0 !important;
          pointer-events: none !important;
        }
      `;
      document.head.appendChild(style);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
